# Temps deployment configuration for Bifrost LLM Gateway
# Docs: https://temps.sh/docs/docker-containers

build:
  args:
    VERSION: latest
    ARG_APP_PORT: "8080"
    ARG_APP_HOST: "0.0.0.0"
    ARG_LOG_LEVEL: info
    ARG_LOG_STYLE: json
    ARG_APP_DIR: /app/data

health:
  path: /health
  timeout: 10
  interval: 30
  retries: 3
